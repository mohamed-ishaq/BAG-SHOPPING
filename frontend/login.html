<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - LUXE BAGS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">LUXURY BAGS</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Collection</a>
            <a href="cart.html" class="cart-icon">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <!-- Auth Page -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-bag-shopping"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your luxury experience</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <div class="alert alert-error" id="loginError" style="display: none;"></div>
                <div class="alert alert-success" id="loginSuccess" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button onclick="handleLogin()" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-bottom: 1rem;">
                    <i class="fas fa-lock"></i> Sign In
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form hidden">
                <div class="alert alert-error" id="registerError" style="display: none;"></div>
                <div class="alert alert-success" id="registerSuccess" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="regUsername">Username *</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address *</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="regFullName">Full Name *</label>
                    <input type="text" id="regFullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="regPhone">Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="regPassword">Password *</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password *</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                </div>

                <button onclick="handleRegister()" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-bottom: 1rem;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-icons">
                    <a href="#" class="social-icon" onclick="socialLogin('google')"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-icon" onclick="socialLogin('facebook')"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-icon" onclick="socialLogin('apple')"><i class="fab fa-apple"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="spinner" id="loadingSpinner" style="display: none;"></div>

    <script>
        // API URL - change this to your server URL
        const API_URL = 'http://localhost:3000/api';

        // ============================================
        // TAB SWITCHING
        // ============================================
        function switchTab(tab) {
            const loginTab = document.querySelectorAll('.auth-tab')[0];
            const registerTab = document.querySelectorAll('.auth-tab')[1];
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                
                // Clear URL parameter
                const url = new URL(window.location);
                url.searchParams.delete('tab');
                window.history.pushState({}, '', url);
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                
                // Add tab parameter to URL
                const url = new URL(window.location);
                url.searchParams.set('tab', 'register');
                window.history.pushState({}, '', url);
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Check URL for tab parameter
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('tab') === 'register') {
                switchTab('register');
            }
            
            // Update cart count
            updateCartCount();
            
            // Check if user is already logged in
            if (localStorage.getItem('token')) {
                window.location.href = 'index.html';
            }
        });

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showLoading(show = true) {
            document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
        }

        function showAlert(element, message, type) {
            // Hide all alerts first
            document.querySelectorAll('.alert').forEach(el => {
                el.style.display = 'none';
            });
            
            // Show the specific alert
            element.textContent = message;
            element.style.display = 'block';
            element.className = `alert alert-${type}`;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.querySelectorAll('.cart-count').forEach(el => {
                el.textContent = count;
            });
        }

        // ============================================
        // LOGIN HANDLER
        // ============================================
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const successEl = document.getElementById('loginSuccess');

            // Validation
            if (!email || !password) {
                showAlert(errorEl, 'Please fill in all fields', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showAlert(errorEl, 'Please enter a valid email address', 'error');
                return;
            }

            // Show loading
            showLoading(true);

            try {
                console.log('Attempting login with:', { email });
                
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store auth data
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Show success message
                showAlert(successEl, 'Login successful! Redirecting...', 'success');
                
                // Redirect after delay
                setTimeout(() => {
                    const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirectUrl;
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                showAlert(errorEl, error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // REGISTER HANDLER
        // ============================================
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const fullName = document.getElementById('regFullName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');

            // Validation
            if (!username || !email || !fullName || !password) {
                showAlert(errorEl, 'Please fill in all required fields', 'error');
                return;
            }

            if (username.length < 3) {
                showAlert(errorEl, 'Username must be at least 3 characters', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showAlert(errorEl, 'Please enter a valid email address', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert(errorEl, 'Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert(errorEl, 'Passwords do not match', 'error');
                return;
            }

            // Show loading
            showLoading(true);

            try {
                console.log('Attempting registration with:', { username, email, fullName, phone });
                
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        full_name: fullName,
                        phone: phone || null
                    })
                });

                const data = await response.json();
                console.log('Registration response:', data);

                if (!response.ok) {
                    throw new Error(data.error || 'Registration failed');
                }

                // Store auth data
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Show success message
                showAlert(successEl, 'Registration successful! Redirecting...', 'success');

                // Redirect after delay
                setTimeout(() => {
                    window.location.href = 'products.html';
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);
                showAlert(errorEl, error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // SOCIAL LOGIN (Demo)
        // ============================================
        function socialLogin(provider) {
            showAlert(document.getElementById('loginError'), `${provider} login coming soon!`, 'info');
        }

        // ============================================
        // FORGOT PASSWORD
        // ============================================
        document.querySelector('.forgot-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            showAlert(document.getElementById('loginError'), 'Password reset feature coming soon!', 'info');
        });

        // ============================================
        // ENTER KEY SUBMIT
        // ============================================
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const loginForm = document.getElementById('loginForm');
                const registerForm = document.getElementById('registerForm');
                
                if (!loginForm.classList.contains('hidden')) {
                    handleLogin();
                } else if (!registerForm.classList.contains('hidden')) {
                    handleRegister();
                }
            }
        });
    </script>
</body>
</html>
